<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.gstatic.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link
  href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap"
  rel="stylesheet"
>

<!-- Font Awesome icons (load asynchronously due to size) -->
{% assign fontawesome = "https://use.fontawesome.com/releases/v6.5.0/css/all.css" %}
<link
  href="{{ fontawesome }}"
  rel="stylesheet"
  media="none"
  onload="this.removeAttribute('media'); this.onload = null;"
/>
<noscript>
  <link href="{{ fontawesome }}" rel="stylesheet">
</noscript>
